services:
  postgres:
    image: postgres:16
    container_name: post-service-db
    environment:
      POSTGRES_DB: postsDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - post-service-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postsDB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  post-service-db-data:
